<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" role="img" aria-label="Wine Roam">
  <!-- Brand mark: grapevine in a rounded tile (matches favicon) -->
  <rect x="8" y="8" width="48" height="48" rx="12" fill="#6B4423"/>
  <g fill="none" stroke="#FBF7F0" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" transform="translate(8,8)">
    <!-- Grapevine: main stem -->
    <path d="M24 40V12"/>
    <!-- Left vine curl -->
    <path d="M24 20c-5-2-8 0-8 4 0 3 2 5 5 4"/>
    <!-- Right vine curl -->
    <path d="M24 28c5-2 8 0 8 4 0 3-2 5-5 4"/>
    <!-- Grapes on left -->
    <circle cx="14" cy="20" r="2"/>
    <circle cx="16" cy="22" r="2"/>
    <!-- Grapes on right -->
    <circle cx="34" cy="28" r="2"/>
    <circle cx="32" cy="30" r="2"/>
  </g>
  <!-- Wordmark -->
  <text x="70" y="34" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="600" fill="#3A2A1A" letter-spacing="0.5">Roam</text>
  <text x="70" y="50" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="9.5" font-weight="600" letter-spacing="2.6" fill="#8A6D3B">WINE</text>
</svg>
